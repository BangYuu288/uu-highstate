    width:100%;

button:hover{

/* TABLE */

.table-wrapper{

    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
}

table{
    width:100%;
    min-width:550px;
}

th,td{

}

th{

    color:#fff;
}

tr:nth-child(even){

tr:hover{

table tr{

.selected{

let totalFine = 0;
let totalTime = 0;
let totalImpound = 0;

let selected = [];
function renderOffences() {
    const content = document.getElementById('content');
    content.innerHTML = "";

    for (const key in OFFENCE_DATA) {
        const section = OFFENCE_DATA[key];

        const sectionDiv = document.createElement('div');
        sectionDiv.className = 'section';
        sectionDiv.innerHTML = `<h2>${section.title}</h2>`;

        const table = document.createElement('table');
        table.innerHTML = `
            <thead>
                <tr>
                    <th>Pasal</th>
                    <th>Deskripsi</th>
                    <th>Denda</th>
                    <th>Masa Tahanan</th>
                    <th>Masa Impound</th>
                </tr>
            </thead>
            <tbody></tbody>
        `;

        const tbody = table.querySelector('tbody');

        section.offences.forEach(offence => {
            const row = document.createElement('tr');

            row.innerHTML = `
                <td>${offence.code}</td>
                <td>${offence.description}</td>
                <td>$${offence.fine.toLocaleString()}</td>
                <td>${offence.time} bulan</td>
                <td>${offence.impound} hari</td>
            `;

            row.addEventListener("click", () => {
                if (row.classList.contains("selected")) {
                    row.classList.remove("selected");

                    totalFine -= offence.fine;
                    totalTime -= offence.time;
                    totalImpound -= offence.impound;

                    selected = selected.filter(code => code !== offence.code);
                } else {
                    row.classList.add("selected");

                    totalFine += offence.fine;
                    totalTime += offence.time;
                    totalImpound += offence.impound;

                    selected.push(offence.code);
                }

                updateSummary();
            });

            tbody.appendChild(row);
        });

        const wrapper = document.createElement("div");
        wrapper.className = "table-wrapper";
        wrapper.appendChild(table);

        sectionDiv.appendChild(wrapper);
        content.appendChild(sectionDiv);
            }
}
            function updateSummary(){

                document.getElementById("totalFine").innerHTML =
                    "$"+totalFine.toLocaleString();

                document.getElementById("totalTime").innerHTML =
                    totalTime+" Bulan";

                document.getElementById("totalImpound").innerHTML =
                    totalImpound+" Hari";

                document.getElementById("selectedPasal").innerHTML =
                    selected.length ? selected.join(", ") : "-";
            }
            function resetSelection(){

    totalFine = 0;
    totalTime = 0;
    totalImpound = 0;

    selected = [];

    document.querySelectorAll(".selected").forEach(row=>{
        row.classList.remove("selected");
    });

    updateSummary();

}
